<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Allo-Movie.net – Bandes-annonces & Sorties Cinéma 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080c10;--card:#0f1520;--hover:#161e2e;--red:#e8372a;--gold:#f5c518;--txt:#e8eaf0;--muted:#6b7a99;--dim:#3a4560;--border:rgba(255,255,255,0.06);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;overflow-x:hidden}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}button{cursor:pointer;border:none;background:none;font-family:inherit}
header{position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.hdr{max-width:1400px;margin:0 auto;padding:0 16px;height:60px;display:flex;align-items:center;gap:16px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;white-space:nowrap}
.logo .r{color:var(--red)}
.search{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
.search input{background:none;border:none;outline:none;color:var(--txt);font-size:13px;width:120px}
.hero{max-width:1400px;margin:12px auto;padding:0 16px}
.hero-card{border-radius:16px;overflow:hidden;background:var(--card);position:relative;min-height:300px;cursor:pointer}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.3}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,12,16,0.98) 0%,rgba(8,12,16,0.5) 60%,transparent 100%)}
.hero-body{position:relative;padding:28px 24px;max-width:520px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,5vw,60px);line-height:1;margin-bottom:10px}
.btn-play{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:var(--red);color:#fff;font-weight:700;border-radius:10px;margin-top:15px}
.main{max-width:1400px;margin:0 auto;padding:0 16px}
.section{margin-bottom:36px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px}
.sec-title span{color:var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px}
.row{display:flex;gap:15px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.card{flex:0 0 160px;background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:0.2s}
.card:hover{transform:translateY(-5px);border-color:var(--red)}
.card-poster{position:relative;aspect-ratio:2/3;background:var(--hover)}
.card-poster img{width:100%;height:100%;object-fit:cover}
.rating{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,0.8);padding:2px 6px;border-radius:5px;color:var(--gold);font-size:11px;font-weight:700}
.card-body{padding:10px}
.card-title{font-size:12px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;padding:10px}
.modal-bg.open{display:flex}
.modal-box{width:min(800px,100%);background:var(--card);border-radius:16px;overflow-y:auto;max-height:90vh}
.video-wrap{position:relative;padding-top:56.25%}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
.modal-info{padding:20px}
.review-section{border-top:1px solid var(--border);margin-top:20px;padding-top:20px}
.stars-input button{font-size:24px;color:var(--dim)}
.stars-input button.active{color:var(--gold)}
.review-form input, .review-form textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:#fff;padding:10px;margin-top:10px;border-radius:8px}
.ad-box{background:var(--card);border:1px dashed var(--dim);height:100px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;margin:20px 0;border-radius:12px}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">ALLO<span class="r">-</span>MOVIE<span style="color:var(--gold);font-size:10px">.NET</span></div>
    <div class="search"><input type="text" placeholder="Rechercher..." oninput="filterFilms(this.value)"></div>
  </div>
</header>

<div class="hero">
    <div class="hero-card" id="heroBtn">
        <img class="hero-img" id="heroImg" src="">
        <div class="hero-grad"></div>
        <div class="hero-body">
            <h1 class="hero-title" id="heroTitle">CHARGEMENT...</h1>
            <p id="heroDesc" style="font-size:13px;opacity:0.8"></p>
            <div class="btn-play">▶ Voir le Trailer</div>
        </div>
    </div>
</div>

<div class="main">
    <div class="section">
        <div class="sec-hdr"><div class="sec-title">🎬 NOUVEAUX <span>TRAILERS</span></div></div>
        <div class="grid" id="gridTrailers"></div>
    </div>
    <div class="ad-box">📢 ESPACE PUBLICITAIRE AdSense 300x250</div>
    <div class="section">
        <div class="sec-hdr"><div class="sec-title">📺 SÉRIES <span>POPULAIRES</span></div></div>
        <div class="row" id="rowTV"></div>
    </div>
    <div class="section">
        <div class="sec-hdr"><div class="sec-title">💥 ACTION</div></div>
        <div class="row" id="rowAction"></div>
    </div>
</div>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="video-wrap"><iframe id="modalFrame" src="" allowfullscreen></iframe></div>
        <div class="modal-info">
            <h2 id="mTitle"></h2>
            <p id="mDesc" style="margin:10px 0; font-size:14px; opacity:0.8"></p>
            
            <div class="review-section">
                <h3 style="font-family:'Bebas Neue';color:var(--gold)">Avis des fans</h3>
                <div class="review-form">
                    <div class="stars-input" id="starInput">
                        <button onclick="setRate(1)">★</button><button onclick="setRate(2)">★</button><button onclick="setRate(3)">★</button><button onclick="setRate(4)">★</button><button onclick="setRate(5)">★</button>
                    </div>
                    <input type="text" id="revName" placeholder="Ton pseudo">
                    <textarea id="revComment" placeholder="Ton avis sur ce film..."></textarea>
                    <button class="btn-play" style="width:100%;justify-content:center" onclick="postReview()">POSTER L'AVIS</button>
                </div>
                <div id="revList" style="margin-top:20px"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY='6881247daf17fbe318f9553dd2798f29', IMG='https://image.tmdb.org/t/p/w500', BIG='https://image.tmdb.org/t/p/original';
let ALL_DATA = [];
let activeId = null, activeRate = 0;

async function fetchTMDB(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}&language=fr-FR`);
    return r.json();
}

function getReviews(id) { return JSON.parse(localStorage.getItem('rev_'+id) || '[]'); }

function renderCard(f) {
    const reviews = getReviews(f.id);
    let displayNote = f.vote_average ? f.vote_average.toFixed(1) : "0.0";
    if(reviews.length > 0) {
        const avg = reviews.reduce((a,b)=>a+b.note, 0) / reviews.length;
        displayNote = ((f.vote_average + avg) / 2).toFixed(1);
    }

    return `
    <div class="card" onclick="openModal('${f.id}', '${f.title||f.name}')">
        <div class="card-poster">
            <img src="${f.poster_path ? IMG+f.poster_path : ''}" loading="lazy">
            <div class="rating">★ ${displayNote}</div>
        </div>
        <div class="card-body">
            <div class="card-title">${f.title || f.name}</div>
        </div>
    </div>`;
}

async function openModal(id, title) {
    activeId = id;
    const data = await fetchTMDB(`/movie/${id}/videos`);
    const trailer = data.results.find(v => v.type === 'Trailer') || data.results[0];
    const details = await fetchTMDB(`/movie/${id}`);
    
    document.getElementById('modalFrame').src = trailer ? `https://www.youtube.com/embed/${trailer.key}?autoplay=1` : '';
    document.getElementById('mTitle').textContent = title;
    document.getElementById('mDesc').textContent = details.overview;
    document.getElementById('modal').classList.add('open');
    loadReviews(id);
}

function closeModal(e) { 
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modalFrame').src = "";
}

function setRate(n) {
    activeRate = n;
    const btns = document.querySelectorAll('#starInput button');
    btns.forEach((b,i) => b.classList.toggle('active', i < n));
}

function postReview() {
    const name = document.getElementById('revName').value;
    const comm = document.getElementById('revComment').value;
    if(!name || !comm || activeRate === 0) return alert("Remplis tout !");
    
    const revs = getReviews(activeId);
    revs.unshift({name, comm, note: activeRate});
    localStorage.setItem('rev_'+activeId, JSON.stringify(revs));
    loadReviews(activeId);
    // On rafraîchit les notes sur la page
    init();
}

function loadReviews(id) {
    const list = document.getElementById('revList');
    const revs = getReviews(id);
    list.innerHTML = revs.map(r => `
        <div style="background:var(--hover);padding:10px;border-radius:8px;margin-bottom:10px;font-size:13px">
            <b style="color:var(--gold)">${r.name} (${'★'.repeat(r.note)})</b><br>${r.comm}
        </div>
    `).join('') || '<p style="font-size:12px;opacity:0.5">Aucun avis...</p>';
}

async function init() {
    try {
        const [pop, tv, act] = await Promise.all([
            fetchTMDB('/movie/popular'),
            fetchTMDB('/tv/popular'),
            fetchTMDB('/discover/movie?with_genres=28')
        ]);

        ALL_DATA = pop.results;
        
        // Hero
        const h = pop.results[0];
        document.getElementById('heroTitle').textContent = h.title.toUpperCase();
        document.getElementById('heroDesc').textContent = h.overview.substring(0,150) + '...';
        document.getElementById('heroImg').src = BIG + h.backdrop_path;
        document.getElementById('heroBtn').onclick = () => openModal(h.id, h.title);

        // Grilles
        document.getElementById('gridTrailers').innerHTML = pop.results.slice(0,10).map(renderCard).join('');
        document.getElementById('rowTV').innerHTML = tv.results.slice(0,10).map(renderCard).join('');
        document.getElementById('rowAction').innerHTML = act.results.slice(0,10).map(renderCard).join('');

    } catch(e) { console.error("Erreur de chargement", e); }
}

init();
</script>
</body>
</html>
